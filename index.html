            <!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tea For rest</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#1c1713;
    color:#d6c6a5;
    font-family:"Noto Serif KR", serif;

    overflow-x:hidden;
    overflow-y:auto;
}

header{
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    transition:
        transform 1.2s ease,
        opacity 1.2s ease;
}

header.hide{
    transform:translateY(-100vh);
    opacity:0;
}

.hero-line{

    width:70vw;
    max-width:900px;

    height:1px;

    background:#4a3c2b;

    margin:0 auto 40px auto;

    opacity:0;

    transition:
        opacity 0.3s ease,
        transform 1.2s ease;

}

.hero-line.show{
    opacity:1;
}

h1{
    font-size:4vw;
    min-font-size:40px;
    letter-spacing:10px;
    margin:0;

    opacity:0;
    transform:translateY(15px);

    animation:
        heroFade 0.5s ease forwards;

    animation-fill-mode:both;
}

.subtitle{

    color:#9d8a68;
    margin-top:15px;

    opacity:0;
    transform:translateY(15px);

    animation:
        heroFade 0.5s ease forwards;

    animation-delay:0.15s;

    animation-fill-mode:both;
}

@keyframes heroFade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.gallery{

    width:80vw;
    max-width:1200px;

    padding:3vh 3vw 5vh;
    margin:auto;

    /* 두 번째 페이지 사진 위치 */
    padding-top:150px;
    padding-right:50px;
    padding-bottom:150px;
    padding-left:50px;

    min-height:100vh;

    /* 중앙 정렬 제거 */
    align-content:start;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2vw;

    opacity:0;

    /* 위치 이동 제거 */
    transform:translateY(0);

    /* 페이드만 적용 */
    transition:
        opacity 0.4s ease;
}

.gallery.show{
    opacity:1;
    transform:translateY(0);
}

.card{
    position:relative;
    background:#2b241d;

    padding:15px;

    border:1px solid #4a3c2b;

    box-shadow:
        0 0 10px rgba(0,0,0,0.4),
        inset 0 0 2px rgba(255,255,255,0.1);

    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
}

.card h3{
    padding:15px;
    margin:0;

    text-align:center;
}
.card h3{
    padding:15px;
    margin:0;

    text-align:center;
}

.tea-date{
    text-align:center;
    color:#8c7a5d;
    font-size:13px;
    margin-top:-10px;
    margin-bottom:15px;
}

.date-box{
    position:absolute;
    top:10px;
    right:10px;
    background:#1c1713;
    padding:6px 10px;
    border:1px solid #4a3c2b;
    opacity:0;
    transition:0.3s;
}

.card:hover .date-box{
    opacity:1;
}

footer{
    text-align:center;
    padding:40px;
    color:#8c7a5d;
}


.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    opacity:0;
    transition:opacity 0.5s;
}


.modal-content{
    display:block;
    margin:auto;
    margin-top:50px;
    max-width:90%;
    max-height:80%;
}


.close{
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:40px;
    cursor:pointer;
}


.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    cursor:pointer;
    background:none;
    border:none;
    color:white;
}

.left{
    left:20px;
}

.right{
    right:20px;
}


.tea-detail{
    background:#2b241d;
    border:1px solid #4a3c2b;
    padding:20px;
    max-width:800px;
    margin:auto;
}


.tea-top{
    display:flex;
    gap:20px;
}


.tea-top img{
    width:60%;
    object-fit:contain;
}


.tea-info{
    width:40%;
    color:#d6c6a5;
    display:flex;
    flex-direction:column;
    justify-content:center;
}


.tea-info p{
    margin:15px 0;
    border-bottom:1px solid #4a3c2b;
    padding-bottom:10px;
}


.tea-description{
    margin-top:20px;
    border-top:1px solid #4a3c2b;
    padding-top:20px;
    color:#c4b28c;
    line-height:1.8;
}

.zoom-image{
    cursor:pointer;
}


.image-zoom{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:10000;
}


.image-zoom img{
    display:block;
    max-width:85%;
    max-height:85%;
    margin:60px auto;
}

.zoom-close{
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:40px;
    cursor:pointer;
}


.zoom-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:white;
    font-size:50px;
    cursor:pointer;
}


.zoom-left{
    left:40px;
}


.zoom-right{
    right:40px;
}


.preview-box{
    position:relative;
    cursor:pointer;
}


.preview-box img{
    width:100%;
    display:block;
}


.preview-dots{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;

    opacity:0;
    transition:opacity 0.3s ease;
}


.preview-box:hover .preview-dots{
    opacity:1;
}


.preview-dots span{
    width:8px;
    height:8px;
    background:#6d6252;
    border-radius:50%;
    opacity:0.7;
}


.preview-dots span.active{
    background:white;
    opacity:1;
}

.gallery-wrapper{
    max-width:1200px;
    margin:auto;
}


.hero-line.move{

    transform:translateY(50vh);

    opacity:1;

}


@media(max-width:768px){

header{
    height:100vh;
}

.gallery{
    width:90vw;
    grid-template-columns:1fr;
    padding:30px 20px;
}

.card img{
    height:250px;
}

}

button{

    background:#2b241d;

    color:#d6c6a5;

    border:1px solid #4a3c2b;

    padding:8px 20px;

    cursor:pointer;

    font-family:"Noto Serif KR", serif;

}


button:hover{

    background:#3a3027;

}

.tea-detail input,
.tea-detail textarea{

    color:#d6c6a5;

    padding:8px;

}


.tea-detail input::placeholder,
.tea-detail textarea::placeholder{

    color:#8c7a5d;

}


.tea-detail textarea{

    width:100%;

    min-height:120px;

    resize:none;

}

.save-button{

    background:#2b241d;

    color:#d6c6a5;

    border:1px solid #4a3c2b;

    padding:8px 25px;

    cursor:pointer;

    font-family:"Noto Serif KR", serif;

    font-weight:700;

}


.save-button:hover{

    background:#332a22;

}


.record-button{

    display:block;

    top:30px;

}


.record-button.show{

    pointer-events:auto;

}



.record-box{

    width:600px;
    max-width:600px;

    box-sizing:border-box;

    margin:0 auto;

    position:absolute;

    top:50%;

    left:50%;

}



.record-box input{

    text-align:center;

}

#teaDateInput{

    display:block;

    margin:0 auto 20px;

    text-align:center;

}

#teaDateInput::-webkit-datetime-edit{
    text-align:center;
}

#teaDateInput::-webkit-datetime-edit-fields-wrapper{
    justify-content:center;
}



.photo-select{

    text-align:center;

    margin-top:40px;

}



.photo-select label{

    border:1px solid #4a3c2b;

    padding:10px 30px;

    cursor:pointer;

}



#photoPreview{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin-top:30px;

}



#photoPreview{

    display:flex;

    gap:8px;

    flex-wrap:wrap;

    margin-top:20px;

    justify-content:center;

}


#photoPreview img{

    width:110px;

    height:110px;

    object-fit:cover;

    border:1px solid #4a3c2b;

    cursor:pointer;

    transition:0.3s;

}


#photoPreview img:hover{

    transform:scale(1.05);

}


.input-title{

    margin:8px 0 3px;

}


.date-center{
    text-align:center;
}

#teaDateInput{
    display:inline-block;
}


.date-box-input{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:5px;

    margin-bottom:20px;

    color:#9d8a68;

}


.date-box-input select{

    background:transparent;

    color:#d6c6a5;

    border:none;

    border-bottom:1px solid #4a3c2b;

    padding:5px 8px;

    font-family:"Noto Serif KR", serif;

    font-size:15px;

    outline:none;

    text-align:center;

}


.date-box-input span{

    color:#8c7a5d;

    font-size:14px;

}


#photoPreview div{

    transition:0.08s ease;

}


#photoPreview .dragging{

    transform:scale(1.04) translateY(-4px);

    opacity:1;

    z-index:10;

    box-shadow:
    0 8px 15px rgba(0,0,0,0.5);

}


#photoPreview .dragging img{

    border:2px solid #d6c6a5;

}


@media(max-width:768px){

.hero-line.move{

    transform:translateY(0);

}

}
            
.galleryModal-scroll{
    overflow-y:auto;
}
</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

function openGalleryFromCard(card){

    console.log("카드:", card);
    console.log("아이디:", card.dataset.id);

    images =
    JSON.parse(card.dataset.images);

    currentIndex = 0;

    currentTeaRecordId = Number(card.dataset.id);

    console.log("현재 저장 ID:", currentTeaRecordId);

    openGallery();

}

const supabaseUrl = "https://yoopwxriujtekdvnbegz.supabase.co";

const supabaseKey = "sb_publishable_kGZwM03Bqk3BuZQ9c-Gz9A_pC3ajF9d";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);


let images = [];

    
function updateDots(index){

let allDots =
document.querySelectorAll(".preview-dots span");


allDots.forEach((dot)=>{

dot.classList.remove("active");

});


allDots[index].classList.add("active");

}

async function updateTeaRecord(){

    if(!currentTeaRecordId){

        alert("차 기록 번호가 없습니다");

        return;

    }


    const memo =
    document.getElementById("memoInput").value;


    const amount =
    document.getElementById("amountInput").value;


    const temperature =
    document.getElementById("temperatureInput").value;


    const water =
    document.getElementById("waterInput").value;



    const { data, error } =

    await supabaseClient
    .from("tea_records")
    .update({

    memo: memo,

    amount: amount,

    temperature: temperature,

    water: water

})
.eq(
    "id",
    currentTeaRecordId)
.select();



    if(error){

        console.log(error);

        alert("수정 실패");

        return;

    }


console.log("수정 결과:", data);

alert("수정 완료");

console.log("저장된 ID:", currentTeaRecordId);
console.log("수정 데이터:", {
    memo:memo,
    amount:amount,
    temperature:temperature,
    water:water
});

const { data:checkData, error:checkError } =
await supabaseClient
.from("tea_records")
.select("*")
.eq("id", currentTeaRecordId);

console.log("수정 후 DB 확인:", checkData);



}
    
let currentIndex = 0;
let currentTeaRecordId = null;


async function loadTeaDetail(){

const { data, error } =
await supabaseClient
.from("tea_records")
.select("*")
.eq("id", currentTeaRecordId)
.single();


if(error){

console.log(error);

return;

}


if(data){

console.log("불러온 데이터:", data);


document.getElementById("amountInput").value =
data.amount ?? "";

document.getElementById("temperatureInput").value =
data.temperature ?? "";

document.getElementById("waterInput").value =
data.water ?? "";

document.getElementById("memoInput").value =
data.memo ?? "";

}

}

function openGallery(){


const modal =
document.getElementById("galleryModal");


modal.style.display="block";


modal.style.overflowY="auto";


document.body.style.overflow="hidden";


setTimeout(()=>{

modal.style.opacity="1";

},10);


showImage();


setTimeout(()=>{

    loadTeaDetail();

},500);


}





function showImage(){


let box =
document.getElementById("modalContent");


let file =
images[currentIndex];



if(file.endsWith(".mp4")){


box.innerHTML =

`

<video id="teaVideo" controls autoplay playsinline style="width:90%; max-height:80%; display:block; margin:auto;">

<source src="${file}" type="video/mp4">

</video>

`;



let video =
document.getElementById("teaVideo");


video.volume=0.3;



}

else{


box.innerHTML =

`

<div class="tea-detail">

<div class="tea-top">


<img 
src="${file}"
class="zoom-image"
onclick="zoomImage('${file}')">


<div class="tea-info">

<p>
용량 :
<input id="amountInput" type="text" placeholder="예: 3g">
</p>

<p>
온도 :
<input id="temperatureInput" type="text" placeholder="예: 80℃">
</p>

<p>
물 :
<input id="waterInput" type="text" placeholder="예: 90ml">
</p>

</div>


</div>


<div class="tea-description">

<h3>포담 금훤 우룡</h3>

<textarea id="memoInput" placeholder="차에 대한 기록을 남겨주세요"></textarea>

<button class="save-button" onclick="updateTeaRecord()">
수정 저장
</button>

</div>


</div>

`;


}



}




function closeGallery(){


const modal =
document.getElementById("galleryModal");


modal.style.opacity="0";


document.body.style.overflow="auto";


document.getElementById("modalContent").innerHTML="";


setTimeout(()=>{

modal.style.display="none";

},500);


}





function nextImage(){


currentIndex++;


if(currentIndex >= images.length){

currentIndex=0;

}


showImage();


}





function prevImage(){


currentIndex--;


if(currentIndex < 0){

currentIndex=images.length-1;

}


showImage();


}



function zoomImage(src){

currentIndex = images.indexOf(src);


let zoom =
document.getElementById("imageZoom");


let img =
document.getElementById("zoomImage");


img.src = images[currentIndex];


zoom.style.display="block";


}



function nextZoomImage(){


currentIndex++;


if(currentIndex >= images.length){

currentIndex=0;

}


document.getElementById("zoomImage").src =
images[currentIndex];


}



function prevZoomImage(){


currentIndex--;


if(currentIndex < 0){

currentIndex=images.length-1;

}


document.getElementById("zoomImage").src =
images[currentIndex];


}



function closeZoom(){

let zoom =
document.getElementById("imageZoom");


zoom.style.display="none";


showImage();


}

function previewMove(event){

let box = event.currentTarget;


let img =
box.querySelector(".previewImage");


let images =
JSON.parse(
box.dataset.images
);


let width =
box.offsetWidth;


let x =
event.offsetX;


let index =
Math.floor(
(x / width) * images.length
);


if(index >= images.length){

index = images.length - 1;

}


img.src =
images[index];


let dots =
box.querySelectorAll(".preview-dots span");


dots.forEach(dot=>{

dot.classList.remove("active");

});


if(dots[index]){

dots[index].classList.add("active");

}


}

let page = 0;
let moving = false;

window.addEventListener("load",()=>{


setTimeout(()=>{


document
.getElementById("movingLine")
.classList.add("show");



/*
첫 번째 페이지 새로고침:
그대로 유지

두 번째 페이지 새로고침:
앨범만 다시 페이드
*/

if(window.scrollY >= window.innerHeight){


document
.getElementById("hero")
.classList.add("hide");


document
.getElementById("gallery")
.classList.add("show");


}


},300);


});

window.addEventListener("wheel",(e)=>{

if(moving) return;

moving = true;

if(e.deltaY > 0){

page = 1;

document
.getElementById("hero")
.classList.add("hide");

document
.getElementById("gallery")
.classList.add("show");

document
.getElementById("movingLine")
.classList.add("show");

document
.getElementById("recordButton")
.classList.add("show");


setTimeout(()=>{

document
.getElementById("movingLine")
.classList.add("move");

},100);

window.scrollTo({

    top:document.querySelector(".gallery-wrapper").offsetTop,

    behavior:"smooth"

});

}else{

page = 0;

document
.getElementById("hero")
.classList.remove("hide");

document
.getElementById("movingLine")
.classList.remove("move");

document
.getElementById("recordButton")
.classList.remove("show");


window.scrollTo({
    top:0,
    behavior:"smooth"
});

}

setTimeout(()=>{

moving = false;

},300);

});

let touchStartY = 0;


window.addEventListener("touchstart",(e)=>{

    touchStartY = e.touches[0].clientY;

});



window.addEventListener("touchend",(e)=>{


    if(moving) return;


    let touchEndY = e.changedTouches[0].clientY;


    let distance = touchStartY - touchEndY;


    if(Math.abs(distance) < 50){

        return;

    }


    moving = true;



    if(distance > 0){


        page = 1;


        document
        .getElementById("hero")
        .classList.add("hide");


        document
        .getElementById("gallery")
        .classList.add("show");


        document
        .getElementById("movingLine")
        .classList.add("show");


        document
        .getElementById("recordButton")
        .classList.add("show");



        setTimeout(()=>{


            document
            .getElementById("movingLine")
            .classList.add("move");


        },100);



            window.scrollTo({

                top:document.querySelector(".gallery-wrapper").offsetTop,

                behavior:"smooth"
    
        });



    }else{


        page = 0;


        document
        .getElementById("hero")
        .classList.remove("hide");


        document
        .getElementById("movingLine")
        .classList.remove("move");


        document
        .getElementById("recordButton")
        .classList.remove("show");



        window.scrollTo({

            top:0,

            behavior:"smooth"

        });


    }



    setTimeout(()=>{


        moving = false;


    },300);



});

  


async function loadTeaRecords(){

const { data, error } =
await supabaseClient

function openRecord(){

    const modal =
    document.getElementById("recordModal");


    modal.style.display="block";


    setTimeout(()=>{

        modal.style.opacity="1";

    },10);

}



function closeRecord(){

    const modal =
    document.getElementById("recordModal");


    modal.style.opacity="0";


    setTimeout(()=>{

        modal.style.display="none";

    },500);

}



let selectedPhotos = [];



function selectPhotos(event){


    selectedPhotos =
    Array.from(event.target.files);


    renderPhotoPreview();

}



function renderPhotoPreview(){


    const preview =
    document.getElementById("photoPreview");


    preview.innerHTML="";


    selectedPhotos.forEach((photo,index)=>{


        const box =
        document.createElement("div");


        box.style.position="relative";


        box.draggable = true;


        box.dataset.index = index;



        const img =
        document.createElement("img");


        img.src =
        URL.createObjectURL(photo);



        if(index === 0){

            img.style.border="3px solid #d6c6a5";

        }



        img.onclick = function(){


            document
            .querySelectorAll("#photoPreview img")
            .forEach((i)=>{

                i.style.border="1px solid #4a3c2b";

            });


            this.style.border="3px solid #d6c6a5";


            selectedPhotos.unshift(
                selectedPhotos.splice(index,1)[0]
            );


            renderPhotoPreview();


        };



        const remove =
        document.createElement("span");


        remove.innerHTML="×";


        remove.style.position="absolute";
        remove.style.top="3px";
        remove.style.right="6px";
        remove.style.color="white";
        remove.style.fontSize="20px";
        remove.style.cursor="pointer";
        remove.style.display="none";



        box.onmouseenter=function(){

            remove.style.display="block";

        };


        box.onmouseleave=function(){

            remove.style.display="none";

        };



        remove.onclick=function(e){

            e.stopPropagation();


            selectedPhotos.splice(index,1);


            renderPhotoPreview();

        };



        box.addEventListener("dragstart",function(e){

            e.dataTransfer.setData(
                "index",
                index
            );

    box.classList.add("dragging");

});


box.addEventListener("dragend",function(){

    box.classList.remove("dragging");

});



        box.addEventListener("dragover",function(e){

            e.preventDefault();

        });



        box.addEventListener("drop",function(e){


            e.preventDefault();


            const from =
            Number(
                e.dataTransfer.getData("index")
            );


            const to =
            index;



            const moved =
            selectedPhotos.splice(from,1)[0];


            selectedPhotos.splice(
                to,
                0,
                moved
            );


            renderPhotoPreview();


        });




        box.appendChild(img);

        box.appendChild(remove);


        preview.appendChild(box);



    });


}



async function saveRecord(){

    const teaName =
    document.getElementById("teaNameInput").value;


    const year =
    document.getElementById("yearInput").value;


    const month =
    document.getElementById("monthInput").value;


    const day =
    document.getElementById("dayInput").value;


    const date =
    `${year}-${month}-${day}`;


    if(!teaName){

        alert("차 이름을 입력해주세요");

        return;

    }


    if(selectedPhotos.length === 0){

        alert("사진을 선택해주세요");

        return;

    }



const imageUrls = [];


for(const photo of selectedPhotos){


    const fileName =
    `${Date.now()}_${photo.name}`;



    const { data:uploadData, error:uploadError } =

    await supabaseClient
    .storage
    .from("tea-images")
    .upload(
        fileName,
        photo
    );



    if(uploadError){

        console.log(uploadError);

        alert("사진 업로드 실패");

        return;

    }



    const { data:urlData } =

    supabaseClient
    .storage
    .from("tea-images")
    .getPublicUrl(
        fileName
    );



    imageUrls.push(
        urlData.publicUrl
    );


}


const imageUrl =
imageUrls[0];



const { data, error } =

await supabaseClient
.from("tea_records")
.insert([

{

    tea_name:teaName,

    image_url:imageUrl,

    images:imageUrls,

    created_at:date,

    amount:"",
    temperature:"",
    water:"",
    memo:""

}

]);



    if(error){

        console.log(error);

        alert("저장 실패");

        return;

    }



    alert("기록 완료");


    closeRecord();


    location.reload();

}

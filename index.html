<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tea For rest</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#1c1713;
    color:#d6c6a5;
    font-family:"Noto Serif KR", serif;

    overflow:hidden;
}

header{
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    transition:
        transform 1.2s ease,
        opacity 1.2s ease;
}

header.hide{
    transform:translateY(-100vh);
    opacity:0;
}

.hero-line{

    width:70vw;
    max-width:900px;

    height:1px;

    background:#4a3c2b;

    margin:0 auto 40px auto;

    opacity:0;

    transition:
        opacity 0.3s ease,
        transform 1.2s ease;

}

.hero-line.show{
    opacity:1;
}

h1{
    font-size:4vw;
    min-font-size:40px;
    letter-spacing:10px;
    margin:0;

    opacity:0;
    transform:translateY(15px);

    animation:
        heroFade 0.5s ease forwards;

    animation-fill-mode:both;
}

.subtitle{

    color:#9d8a68;
    margin-top:15px;

    opacity:0;
    transform:translateY(15px);

    animation:
        heroFade 0.5s ease forwards;

    animation-delay:0.15s;

    animation-fill-mode:both;
}

@keyframes heroFade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.gallery{

    width:80vw;
    max-width:1200px;

    padding:3vh 3vw 5vh;
    margin:auto;

    /* 두 번째 페이지 사진 위치 */
    padding-top:150px;
    padding-right:50px;
    padding-bottom:150px;
    padding-left:50px;

    min-height:100vh;

    /* 중앙 정렬 제거 */
    align-content:start;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2vw;

    opacity:0;

    /* 위치 이동 제거 */
    transform:translateY(0);

    /* 페이드만 적용 */
    transition:
        opacity 0.4s ease;
}

.gallery.show{
    opacity:1;
    transform:translateY(0);
}

.card{
    position:relative;
    background:#2b241d;

    padding:15px;

    border:1px solid #4a3c2b;

    box-shadow:
        0 0 10px rgba(0,0,0,0.4),
        inset 0 0 2px rgba(255,255,255,0.1);

    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.card h3{
    padding:15px;
    margin:0;

    text-align:center;
}
.card h3{
    padding:15px;
    margin:0;

    text-align:center;
}

.tea-date{
    text-align:center;
    color:#8c7a5d;
    font-size:13px;
    margin-top:-10px;
    margin-bottom:15px;
}

.date-box{
    position:absolute;
    top:10px;
    right:10px;
    background:#1c1713;
    padding:6px 10px;
    border:1px solid #4a3c2b;
    opacity:0;
    transition:0.3s;
}

.card:hover .date-box{
    opacity:1;
}

footer{
    text-align:center;
    padding:40px;
    color:#8c7a5d;
}


.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    opacity:0;
    transition:opacity 0.5s;
}


.modal-content{
    display:block;
    margin:auto;
    margin-top:50px;
    max-width:90%;
    max-height:80%;
}


.close{
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:40px;
    cursor:pointer;
}


.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    cursor:pointer;
    background:none;
    border:none;
    color:white;
}

.left{
    left:20px;
}

.right{
    right:20px;
}


.tea-detail{
    background:#2b241d;
    border:1px solid #4a3c2b;
    padding:20px;
    max-width:800px;
    margin:auto;
}


.tea-top{
    display:flex;
    gap:20px;
}


.tea-top img{
    width:60%;
    object-fit:contain;
}


.tea-info{
    width:40%;
    color:#d6c6a5;
    display:flex;
    flex-direction:column;
    justify-content:center;
}


.tea-info p{
    margin:15px 0;
    border-bottom:1px solid #4a3c2b;
    padding-bottom:10px;
}


.tea-description{
    margin-top:20px;
    border-top:1px solid #4a3c2b;
    padding-top:20px;
    color:#c4b28c;
    line-height:1.8;
}

.zoom-image{
    cursor:pointer;
}


.image-zoom{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:10000;
}


.image-zoom img{
    display:block;
    max-width:85%;
    max-height:85%;
    margin:60px auto;
}

.zoom-close{
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:40px;
    cursor:pointer;
}


.zoom-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:white;
    font-size:50px;
    cursor:pointer;
}


.zoom-left{
    left:40px;
}


.zoom-right{
    right:40px;
}


.preview-box{
    position:relative;
    cursor:pointer;
}


.preview-box img{
    width:100%;
    display:block;
}


.preview-dots{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
}


.preview-dots span{
    width:8px;
    height:8px;
    background:#6d6252;
    border-radius:50%;
    opacity:0.7;
}


.preview-dots span.active{
    background:white;
    opacity:1;
}

.gallery-wrapper{
    max-width:1200px;
    margin:auto;
}


.hero-line.move{

    transform:translateY(100vh);

    opacity:1;

}

@media(max-width:768px){

body{
    overflow:auto;
}

.gallery{
    opacity:1;
}

}

@media(max-width:768px){

header{
    height:40vh;
}

.gallery-wrapper{
    margin-top:0;
}

}

button{

    background:#2b241d;

    color:#d6c6a5;

    border:1px solid #4a3c2b;

    padding:8px 20px;

    cursor:pointer;

    font-family:"Noto Serif KR", serif;

}


button:hover{

    background:#3a3027;

}

.tea-detail input,
.tea-detail textarea{

    background:#2b241d;

    color:#d6c6a5;

    border:none;

    padding:8px;

    font-family:"Noto Serif KR", serif;

    outline:none;

}


.tea-detail input::placeholder,
.tea-detail textarea::placeholder{

    color:#8c7a5d;

}


.tea-detail textarea{

    width:100%;

    min-height:120px;

    resize:none;

}

.save-button{

    background:#2b241d;

    color:#d6c6a5;

    border:1px solid #4a3c2b;

    padding:8px 25px;

    cursor:pointer;

    font-family:"Noto Serif KR", serif;

    font-weight:700;

}


.save-button:hover{

    background:#332a22;

}


.record-button{

    display:block;

    position:fixed;

    top:30px;

    right:40px;

    z-index:9999;

    padding:8px 24px;

    font-size:16px;

    opacity:0;

    pointer-events:none;

    transition:opacity 0.8s ease;

}


.record-button.show{

    opacity:1;

    pointer-events:auto;

}



.record-box{

    max-width:600px;

    margin:0 auto;

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

}



.record-box input{

    width:100%;

    box-sizing:border-box;

    margin-bottom:8px;

    text-align:center;

}

#teaDateInput{

    display:block;

    margin:0 auto 20px;

    text-align:center;

}

#teaDateInput::-webkit-datetime-edit{
    text-align:center;
}

#teaDateInput::-webkit-datetime-edit-fields-wrapper{
    justify-content:center;
}



.photo-select{

    text-align:center;

    margin-top:40px;

}



.photo-select label{

    border:1px solid #4a3c2b;

    padding:10px 30px;

    cursor:pointer;

}



#photoPreview{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin-top:30px;

}



#photoPreview{

    display:flex;

    gap:8px;

    flex-wrap:wrap;

    margin-top:20px;

    justify-content:center;

}


#photoPreview img{

    width:110px;

    height:110px;

    object-fit:cover;

    border:1px solid #4a3c2b;

    cursor:pointer;

    transition:0.3s;

}


#photoPreview img:hover{

    transform:scale(1.05);

}


.input-title{

    margin:8px 0 3px;

}


.date-center{
    text-align:center;
}

#teaDateInput{
    display:inline-block;
}


.date-box-input{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:5px;

    margin-bottom:20px;

    color:#9d8a68;

}


.date-box-input select{

    background:transparent;

    color:#d6c6a5;

    border:none;

    border-bottom:1px solid #4a3c2b;

    padding:5px 8px;

    font-family:"Noto Serif KR", serif;

    font-size:15px;

    outline:none;

    text-align:center;

}


.date-box-input span{

    color:#8c7a5d;

    font-size:14px;

}
    
</style>

</head>


<body>

<header id="hero">

<h1>Tea For Rest</h1>

<p class="subtitle">
제가 마신 차 구경해주세요.
</p>

<div class="hero-line" id="movingLine"></div>

</header>



<div class="gallery-wrapper">


<section class="gallery" id="gallery">

</section>


</div>


<button id="recordButton" class="record-button" onclick="openRecord()">
기록하기
</button>


<div id="recordModal" class="modal">


<span class="close" onclick="closeRecord()">×</span>


<div class="tea-detail record-box">


<h2>
무슨 차를 마셨나요?
</h2>


<p class="input-title">
이름
</p>

<input id="teaNameInput" type="text">


<p class="input-title">
날짜
</p>

<div class="date-center">
<div class="date-box-input">
    <select id="yearInput"></select>
    <span>년</span>

    <select id="monthInput"></select>
    <span>월</span>

    <select id="dayInput"></select>
    <span>일</span>
</div>
</div>



<div class="photo-select">


<label for="photoInput">
사진 선택
</label>


<input 
id="photoInput"
type="file"
accept="image/*"
multiple
onchange="selectPhotos(event)"
style="display:none">


</div>



<div id="photoPreview"></div>



<button class="save-button"
onclick="saveRecord()">

저장

</button>


</div>


</div>

<footer>

Tea For rest © 2026

</footer>




<div id="galleryModal" class="modal">


<span class="close"
onclick="closeGallery()">×</span>



<button class="nav left"
onclick="prevImage()">❮</button>



<div id="modalContent" class="modal-content"></div>



<button class="nav right"
onclick="nextImage()">❯</button>



</div>


<div id="imageZoom" class="image-zoom">

<span class="zoom-close"
onclick="closeZoom()">×</span>


<button class="zoom-nav zoom-left"
onclick="prevZoomImage()">❮</button>


<img id="zoomImage">


<button class="zoom-nav zoom-right"
onclick="nextZoomImage()">❯</button>


</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://yoopwxriujtekdvnbegz.supabase.co";

const supabaseKey = "sb_publishable_kGZwM03Bqk3BuZQ9c-Gz9A_pC3ajF9d";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);


const images = [

"images/geumhyun/0.jpg",

"images/geumhyun/1.jpg",

"images/geumhyun/2.jpg",

"images/geumhyun/3.jpg",

];


async function saveTeaRecord(){

const memo =
document.getElementById("memoInput").value;


const amount =
document.getElementById("amountInput").value;


const temperature =
document.getElementById("temperatureInput").value;


const water =
document.getElementById("waterInput").value;



const { data, error } =
await supabaseClient
.from("tea_records")
.insert([
{
memo: memo,
amount: amount,
temperature: temperature,
water: water
}
]);



if(error){

console.log(error);

alert("저장 실패");

}

else{

alert("저장 완료");

}

}

    
function updateDots(index){

let allDots =
document.querySelectorAll(".preview-dots span");


allDots.forEach((dot)=>{

dot.classList.remove("active");

});


allDots[index].classList.add("active");

}

let currentIndex = 0;




function openGallery(){


const modal =
document.getElementById("galleryModal");


modal.style.display="block";


setTimeout(()=>{

modal.style.opacity="1";

},10);



showImage();


}





function showImage(){


let box =
document.getElementById("modalContent");


let file =
images[currentIndex];



if(file.endsWith(".mp4")){


box.innerHTML =

`

<video id="teaVideo" controls autoplay playsinline style="width:90%; max-height:80%; display:block; margin:auto;">

<source src="${file}" type="video/mp4">

</video>

`;



let video =
document.getElementById("teaVideo");


video.volume=0.3;



}

else{


box.innerHTML =

`

<div class="tea-detail">

<div class="tea-top">


<img 
src="${file}"
class="zoom-image"
onclick="zoomImage('${file}')">


<div class="tea-info">

<p>
용량 :
<input id="amountInput" type="text" placeholder="예: 3g">
</p>

<p>
온도 :
<input id="temperatureInput" type="text" placeholder="예: 80℃">
</p>

<p>
물 :
<input id="waterInput" type="text" placeholder="예: 90ml">
</p>

</div>


</div>


<div class="tea-description">

<h3>포담 금훤 우룡</h3>

<textarea id="memoInput" placeholder="차에 대한 기록을 남겨주세요"></textarea>

<button class="save-button" onclick="saveTeaRecord()">
저장
</button>

</div>


</div>

`;


}



}




function closeGallery(){


const modal =
document.getElementById("galleryModal");


modal.style.opacity="0";



document.getElementById("modalContent").innerHTML="";



setTimeout(()=>{

modal.style.display="none";

},500);



}





function nextImage(){


currentIndex++;


if(currentIndex >= images.length){

currentIndex=0;

}


showImage();


}





function prevImage(){


currentIndex--;


if(currentIndex < 0){

currentIndex=images.length-1;

}


showImage();


}



function zoomImage(src){

currentIndex = images.indexOf(src);


let zoom =
document.getElementById("imageZoom");


let img =
document.getElementById("zoomImage");


img.src = images[currentIndex];


zoom.style.display="block";


}



function nextZoomImage(){


currentIndex++;


if(currentIndex >= images.length){

currentIndex=0;

}


document.getElementById("zoomImage").src =
images[currentIndex];


}



function prevZoomImage(){


currentIndex--;


if(currentIndex < 0){

currentIndex=images.length-1;

}


document.getElementById("zoomImage").src =
images[currentIndex];


}



function closeZoom(){

let zoom =
document.getElementById("imageZoom");


zoom.style.display="none";


showImage();


}

const previewImages = [

"images/geumhyun/0.jpg",

"images/geumhyun/1.jpg",

"images/geumhyun/2.jpg",

"images/geumhyun/3.jpg"

];


const dots =
document.getElementById("previewDots");

if(dots){

previewImages.forEach(()=>{

let dot =
document.createElement("span");

dots.appendChild(dot);

});

updateDots(0);

}


function previewMove(event){

let box =
event.currentTarget;


let width =
box.offsetWidth;


let x =
event.offsetX;


let index =
Math.floor((x / width) * previewImages.length);


if(index >= previewImages.length){

index = previewImages.length - 1;

}


document.getElementById("previewImage").src =
previewImages[index];

updateDots(index);

}

let page = 0;
let moving = false;

window.addEventListener("load",()=>{


setTimeout(()=>{


document
.getElementById("movingLine")
.classList.add("show");



/*
첫 번째 페이지 새로고침:
그대로 유지

두 번째 페이지 새로고침:
앨범만 다시 페이드
*/

if(window.scrollY >= window.innerHeight){


document
.getElementById("hero")
.classList.add("hide");


document
.getElementById("gallery")
.classList.add("show");


}


},300);


});

window.addEventListener("wheel",(e)=>{

if(moving) return;

moving = true;

if(e.deltaY > 0){

page = 1;

document
.getElementById("hero")
.classList.add("hide");

document
.getElementById("gallery")
.classList.add("show");

document
.getElementById("movingLine")
.classList.add("show");

document
.getElementById("recordButton")
.classList.add("show");


setTimeout(()=>{

document
.getElementById("movingLine")
.classList.add("move");

},100);

window.scrollTo({
    top:window.innerHeight,
    behavior:"smooth"
});

}else{

page = 0;

document
.getElementById("hero")
.classList.remove("hide");

document
.getElementById("movingLine")
.classList.remove("move");

document
.getElementById("recordButton")
.classList.remove("show");


window.scrollTo({
    top:0,
    behavior:"smooth"
});

}

setTimeout(()=>{

moving = false;

},1000);

});

async function loadTeaRecords(){

const { data, error } =
await supabaseClient
.from("tea_records")
.select("*")
.order("created_at",{ascending:false});


if(error){

console.log(error);
return;

}


const gallery =
document.getElementById("gallery");


data.forEach((tea)=>{


const card =
document.createElement("div");


card.className="card";


card.innerHTML = `

<div class="preview-box"
onmousemove="previewMove(event)">

<img 
id="previewImage"
src="${tea.image_url || 'https://via.placeholder.com/600x400'}">


<div class="preview-dots">
<span class="active"></span>
<span></span>
<span></span>
<span></span>

</div>

</div>


<h3>
${tea.tea_name || "이름 없는 차"}
</h3>


<p class="tea-date">
${new Date(tea.created_at).toLocaleDateString("ko-KR")}
</p>


`;



gallery.appendChild(card);


});


}

function openRecord(){

    const modal =
    document.getElementById("recordModal");


    modal.style.display="block";


    setTimeout(()=>{

        modal.style.opacity="1";

    },10);

}



function closeRecord(){

    const modal =
    document.getElementById("recordModal");


    modal.style.opacity="0";


    setTimeout(()=>{

        modal.style.display="none";

    },500);

}



let selectedPhotos = [];



function selectPhotos(event){


    selectedPhotos =
    Array.from(event.target.files);


    const preview =
    document.getElementById("photoPreview");


    preview.innerHTML="";


selectedPhotos.forEach((photo,index)=>{

    let img =
    document.createElement("img");


    img.src =
    URL.createObjectURL(photo);


    img.dataset.index = index;


    img.onclick = function(){

        document
        .querySelectorAll("#photoPreview img")
        .forEach((i)=>{

            i.style.border="none";

        });


        this.style.border="2px solid #d6c6a5";


        selectedPhotos.unshift(
            selectedPhotos.splice(index,1)[0]
        );

    };


if(index === 0){

    img.style.border="3px solid #d6c6a5";

}


    preview.appendChild(img);


});


}



async function saveRecord(){

    const teaName =
    document.getElementById("teaNameInput").value;


    const year =
    document.getElementById("yearInput").value;


    const month =
    document.getElementById("monthInput").value;


    const day =
    document.getElementById("dayInput").value;


    const date =
    `${year}-${month}-${day}`;


    if(!teaName){

        alert("차 이름을 입력해주세요");

        return;

    }


    if(selectedPhotos.length === 0){

        alert("사진을 선택해주세요");

        return;

    }



    const photo =
    selectedPhotos[0];


    const fileName =
    `${Date.now()}_${photo.name}`;



    const { data:uploadData, error:uploadError } =

    await supabaseClient
    .storage
    .from("tea-images")
    .upload(
        fileName,
        photo
    );



    if(uploadError){

        console.log(uploadError);

        alert("사진 업로드 실패");

        return;

    }



    const { data:urlData } =

    supabaseClient
    .storage
    .from("tea-images")
    .getPublicUrl(
        fileName
    );



    const imageUrl =
    urlData.publicUrl;



    const { data, error } =

    await supabaseClient
    .from("tea_records")
    .insert([

    {

        tea_name:teaName,

        image_url:imageUrl,

        created_at:date

    }

    ]);



    if(error){

        console.log(error);

        alert("저장 실패");

        return;

    }



    alert("기록 완료");


    closeRecord();


    location.reload();

}
